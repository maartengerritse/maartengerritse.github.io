<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tactive — Internal Glossary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f7f6f3;
      --surface:   #ffffff;
      --surface2:  #f0efe9;
      --border:    rgba(0,0,0,0.08);
      --border-md: rgba(0,0,0,0.14);
      --text-1:    #1a1917;
      --text-2:    #5c5a55;
      --text-3:    #9e9b94;
      --accent:    #1a1917;
      --green-bg:  #e6f4ec;
      --green-tx:  #1a6636;
      --blue-bg:   #e8f1fb;
      --blue-tx:   #1a4a8a;
      --amber-bg:  #fdf1d8;
      --amber-tx:  #7a4c00;
      --red-bg:    #fdeaea;
      --red-tx:    #8a1c1c;
      --gray-bg:   #eeece6;
      --gray-tx:   #4a4844;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #141412;
        --surface:   #1e1d1a;
        --surface2:  #252420;
        --border:    rgba(255,255,255,0.07);
        --border-md: rgba(255,255,255,0.13);
        --text-1:    #eceae3;
        --text-2:    #918e86;
        --text-3:    #5e5c56;
        --accent:    #eceae3;
        --green-bg:  #0d2e19;
        --green-tx:  #5fd68a;
        --blue-bg:   #0d1f3a;
        --blue-tx:   #6aadff;
        --amber-bg:  #2e1f04;
        --amber-tx:  #f5c060;
        --red-bg:    #2e0e0e;
        --red-tx:    #f07070;
        --gray-bg:   #2a2925;
        --gray-tx:   #c4c1b8;
      }
    }

    html { font-size: 16px; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .page { max-width: 780px; margin: 0 auto; padding: 3rem 1.5rem 6rem; }

    /* ── Header ── */
    header { margin-bottom: 3rem; }
    .wordmark {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .wordmark::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: var(--border-md);
    }
    header h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 300;
      letter-spacing: -.02em;
      line-height: 1.2;
      color: var(--text-1);
    }
    header h1 strong { font-weight: 500; }
    header p {
      margin-top: .6rem;
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.6;
      max-width: 480px;
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
      margin-bottom: 2.5rem;
    }
    .search-wrap svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      opacity: .4;
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 10px 14px 10px 38px;
      background: var(--surface);
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text-1);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    #search::placeholder { color: var(--text-3); }
    #search:focus {
      border-color: var(--text-3);
      box-shadow: 0 0 0 3px var(--border);
    }

    /* ── Sections ── */
    .section { margin-bottom: 2.25rem; }
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: .75rem;
      padding-left: 1px;
    }

    /* ── Term cards ── */
    .term-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 6px;
      overflow: hidden;
      transition: border-color .15s;
    }
    .term-card:hover { border-color: var(--border-md); }
    .term-card.open { border-color: var(--border-md); }

    .term-trigger {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: .9rem 1.1rem;
      cursor: pointer;
      user-select: none;
    }
    .term-trigger::-webkit-details-marker { display: none; }

    .term-left { flex: 1; min-width: 0; }
    .term-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-1);
      margin-bottom: 2px;
    }
    .term-summary {
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.55;
    }

    .term-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      padding-top: 1px;
    }
    .badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .04em;
      padding: 3px 8px;
      border-radius: 20px;
    }
    .badge-app     { background: var(--blue-bg);  color: var(--blue-tx); }
    .badge-event   { background: var(--green-bg); color: var(--green-tx); }
    .badge-content { background: var(--amber-bg); color: var(--amber-tx); }
    .badge-tool    { background: var(--red-bg);   color: var(--red-tx); }
    .badge-person  { background: var(--gray-bg);  color: var(--gray-tx); }

    .chevron {
      width: 16px;
      height: 16px;
      color: var(--text-3);
      transition: transform .2s;
      flex-shrink: 0;
    }
    .term-card.open .chevron { transform: rotate(180deg); }

    /* ── Detail panel ── */
    .term-detail {
      display: none;
      padding: 0 1.1rem 1.1rem;
      border-top: 0.5px solid var(--border);
      margin-top: 0;
    }
    .term-card.open .term-detail { display: block; }

    .detail-body {
      font-size: 13.5px;
      color: var(--text-1);
      line-height: 1.7;
      padding-top: .9rem;
    }

    .meta-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-3);
      margin: .9rem 0 .4rem;
    }

    .chip-row { display: flex; flex-wrap: wrap; gap: 5px; }
    .chip {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 0.5px solid var(--border-md);
      color: var(--text-2);
    }
    .rel-chip {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 0.5px solid var(--border-md);
      color: var(--text-2);
      cursor: pointer;
      transition: background .12s, color .12s;
      background: transparent;
      font-family: inherit;
    }
    .rel-chip:hover {
      background: var(--surface2);
      color: var(--text-1);
    }

    .note-box {
      margin-top: .9rem;
      padding: .6rem .85rem;
      background: var(--amber-bg);
      border-radius: var(--radius-sm);
      border-left: 2px solid var(--amber-tx);
      font-size: 12.5px;
      color: var(--amber-tx);
      line-height: 1.55;
    }

    .hierarchy-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: .4rem;
    }
    .hierarchy-row .step {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-1);
      background: var(--surface2);
      padding: 3px 10px;
      border-radius: var(--radius-sm);
    }
    .hierarchy-row .arr { color: var(--text-3); font-size: 12px; }

    /* ── Empty state ── */
    .no-results {
      padding: 3rem 0;
      text-align: center;
      font-size: 14px;
      color: var(--text-3);
    }

    /* ── Footer ── */
    footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 0.5px solid var(--border);
      font-size: 12px;
      color: var(--text-3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .5rem;
    }

    /* ── Highlight ── */
    mark {
      background: var(--amber-bg);
      color: var(--amber-tx);
      border-radius: 2px;
      padding: 0 1px;
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="wordmark">Tactive — Internal reference</div>
    <h1><strong>Product Glossary</strong></h1>
    <p>Terms, concepts, and naming conventions across the Tactive platform. Click any term to expand its definition.</p>
  </header>

  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.2"/>
      <path d="M10 10l3.5 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <input type="text" id="search" placeholder="Search terms…" oninput="filterTerms(this.value)" autocomplete="off" spellcheck="false">
  </div>

  <div id="glossary-root"></div>

  <footer>
    <span>Tactive internal glossary</span>
    <span>For questions, contact your product team</span>
  </footer>

</div>
<script>
const data = [
  {
    section: "Apps & Platforms",
    terms: [
      {
        name: "Tactive Training",
        badge: "app", badgeLabel: "App",
        summary: "The VR app on the Meta Quest headset where players experience training.",
        detail: "The dedicated headset application running on the Meta Quest. Players use this to play the training scenarios that coaches have scheduled or assigned. All actual in-VR training happens here.",
        usedBy: ["Players"],
        platforms: ["Meta Quest headset"],
        related: ["Training Session", "Playlist", "Scenario"]
      },
      {
        name: "Tactive Coach",
        badge: "app", badgeLabel: "App",
        summary: "The control platform for coaches to organise, create, and manage training.",
        detail: "The main backend platform for coaches, analysts, and staff. Used to create scenarios, build playlists, schedule sessions, and monitor training. Available across three form factors with varying functionality.",
        usedBy: ["Coaches", "Analysts", "Staff"],
        platforms: ["Desktop (macOS / Windows)", "Tablet", "Mobile"],
        related: ["Dashboard", "Inbox", "Training Session", "Contacts", "Playlist", "Scenario Studio", "Tactive Library"]
      },
      {
        name: "Tactive Coach — Desktop",
        badge: "app", badgeLabel: "App",
        summary: "Full-featured version of Tactive Coach. The primary tool for creation and management.",
        detail: "The most capable version of Tactive Coach. Supports all features including scenario creation in Scenario Studio, playlist building, full session management, and deep organisation tools. The backbone of day-to-day coaching operations.",
        platforms: ["macOS (downloadable app)", "Windows (downloadable executable)"],
        related: ["Tactive Coach", "Scenario Studio", "Playlist"]
      },
      {
        name: "Tactive Coach — Tablet",
        badge: "app", badgeLabel: "App",
        summary: "Lighter version of Tactive Coach for tablet use. No scenario creation.",
        detail: "A reduced-functionality version of Tactive Coach designed for tablet screens. Good for viewing sessions and light management, but scenario creation is not available.",
        platforms: ["Tablet (iOS / Android)"],
        related: ["Tactive Coach", "Tactive Coach — Mobile"]
      },
      {
        name: "Tactive Coach — Mobile",
        badge: "app", badgeLabel: "App",
        summary: "Lightweight mobile version focused on joining live sessions and giving live feedback.",
        detail: "The most limited version of Tactive Coach, optimised for mobile screen real estate. Mainly used to join live training sessions and provide real-time feedback to the player. Not suited for creation or intensive management tasks.",
        platforms: ["Mobile (iOS / Android)"],
        related: ["Tactive Coach", "Training Session", "Live Session Participation"]
      }
    ]
  },
  {
    section: "Training Events",
    terms: [
      {
        name: "Training Session",
        badge: "event", badgeLabel: "Event",
        summary: "A live or scheduled event where a player performs training in the headset.",
        detail: "The core live event in Tactive. Comparable to a Zoom or Google Meet call — it is a moment in time, started by participants. A training session always has at least one player wearing a headset and playing scenarios. Coaches and staff can join to observe and provide feedback. Sessions appear in three states: live (happening now), upcoming (scheduled), or completed (historical).",
        usedBy: ["Players (in headset)", "Coaches", "Analysts"],
        related: ["Playlist", "Live Session Participation", "Tactive Training", "Tactive Coach"]
      },
      {
        name: "Live Session Participation",
        badge: "event", badgeLabel: "Event",
        summary: "Joining an active training session to observe and coach in real time.",
        detail: "During a live training session, coaches and other staff can join from Tactive Coach (desktop, tablet, or mobile) to observe the player, see what scenarios they are running, and provide live feedback. This functionality was previously known as the 'Spectator App' but is now fully integrated into Tactive Coach and encompasses more than just watching.",
        note: "Previously called 'Spectator App'. That name is deprecated — use 'live session participation' or simply 'joining a session'.",
        related: ["Training Session", "Tactive Coach — Mobile"]
      }
    ]
  },
  {
    section: "Content",
    terms: [
      {
        name: "Scenario",
        badge: "content", badgeLabel: "Content",
        summary: "The core unit of training content. A short moment from a real match, turned into a training exercise.",
        detail: "A scenario is a clip of roughly 8–14 seconds taken from a real match. It captures a specific decision-making moment and is designed to give the player an insight or trigger a specific behaviour. Scenarios can be enriched with coaching context and objectives. Think of a scenario as a single training exercise — like a song in a playlist.",
        hierarchy: ["Match", "Scenario", "Playlist"],
        related: ["Playlist", "Scenario Studio", "Match Ingest"]
      },
      {
        name: "Playlist",
        badge: "content", badgeLabel: "Content",
        summary: "A curated collection of scenarios built around a specific training goal.",
        detail: "A playlist groups multiple scenarios together around a theme, concept, or learning objective — for example, pressing triggers for a midfielder. Coaches build playlists in Tactive Coach by selecting and ordering scenarios. A playlist is delivered to players inside a training session. One session typically contains one playlist, though multiple are possible.",
        hierarchy: ["Scenario", "Playlist", "Training Session"],
        related: ["Scenario", "Training Session", "Tactive Library"]
      },
      {
        name: "Playlist Pack",
        badge: "content", badgeLabel: "Content",
        summary: "A bundle of playlists grouped by theme, position, or difficulty.",
        detail: "A higher-order collection available in the Tactive Library. Playlist packs group multiple playlists together around a broader theme such as pressing, scanning, position-specific decision making, or difficulty levels. Useful for building out a full training programme quickly.",
        related: ["Playlist", "Tactive Library"]
      },
      {
        name: "Scenario Pack",
        badge: "content", badgeLabel: "Content",
        summary: "A collection of individual scenarios, available in the Tactive Library.",
        detail: "A curated set of individual scenarios grouped thematically. Available for download or purchase in the Tactive Library, allowing coaches to expand their scenario pool without building from scratch.",
        related: ["Scenario", "Tactive Library"]
      }
    ]
  },
  {
    section: "Creation Tools",
    terms: [
      {
        name: "Scenario Studio",
        badge: "tool", badgeLabel: "Tool",
        summary: "The tool where coaches create scenarios from match footage.",
        detail: "Scenario Studio is the environment within Tactive Coach (Desktop) used to load match data, browse through match moments, and convert those moments into training scenarios. Coaches can also enrich scenarios with coaching elements — objectives, context, player behaviour prompts — to transform a raw match moment into a purposeful training scenario.",
        related: ["Match Ingest", "Scenario", "Tactive Coach — Desktop"]
      },
      {
        name: "Match Ingest",
        badge: "tool", badgeLabel: "Tool",
        summary: "The pipeline that imports raw match data and tags it with events and moments.",
        detail: "The system that prepares raw match footage and data for use in Scenario Studio. Match ingest imports a full match or portion of a match, detects and flags events (passes, goals, shots, defensive actions, etc.), and structures them as tagged moments. This makes browsing and selecting moments for scenario creation fast and efficient.",
        related: ["Scenario Studio", "Scenario"]
      }
    ]
  },
  {
    section: "Navigation & Organisation",
    terms: [
      {
        name: "Dashboard",
        badge: "tool", badgeLabel: "View",
        summary: "The operational overview for coaches — today's sessions, activity, and action items.",
        detail: "The home screen of Tactive Coach. Shows what is relevant and actionable for today: upcoming and live sessions, player readiness, content status, and other items needing attention. Designed to answer 'what do I need to focus on right now?'",
        related: ["Tactive Coach", "Training Session"]
      },
      {
        name: "Inbox",
        badge: "tool", badgeLabel: "View",
        summary: "Notifications and messages — shared playlists, connection requests, session alerts.",
        detail: "The notification and messaging centre inside Tactive Coach. Surfaces activity from your network such as: a coach has shared a playlist with you, a player has requested to connect, a training session is starting, or other updates from contacts.",
        related: ["Contacts", "Tactive Coach"]
      },
      {
        name: "Contacts",
        badge: "person", badgeLabel: "People",
        summary: "The people you are connected with in Tactive — players, coaches, staff, and other users.",
        detail: "Your network inside the Tactive platform. Contacts can include players you manage, other coaches and analysts, and any other Tactive users who are connected to you or your organisation. You can invite contacts, connect with external organisations, and manage who you share content or sessions with.",
        related: ["Inbox", "Training Session"]
      },
      {
        name: "Tactive Library",
        badge: "content", badgeLabel: "Content",
        summary: "The marketplace for pre-built content — playlists, scenarios, and packs.",
        detail: "The content discovery and distribution hub inside Tactive Coach. Coaches can browse, purchase, or download ready-made playlists, playlist packs, and scenario packs. Organised by theme, position, and difficulty. Distinct from your own locally created content.",
        related: ["Playlist", "Playlist Pack", "Scenario Pack"]
      }
    ]
  },
  {
    section: "Roles",
    terms: [
      {
        name: "Coach",
        badge: "person", badgeLabel: "Role",
        summary: "Primary user of Tactive Coach. Creates content, plans sessions, and provides feedback.",
        detail: "The main user persona of the Tactive Coach platform. Responsible for creating scenarios, building playlists, scheduling training sessions, and coaching players live during sessions.",
        related: ["Tactive Coach", "Training Session", "Scenario Studio"]
      },
      {
        name: "Player",
        badge: "person", badgeLabel: "Role",
        summary: "The person wearing the headset and performing training in VR.",
        detail: "The athlete who uses the Tactive Training app on the Meta Quest headset to complete training sessions. Players are the end recipients of the content created by coaches.",
        related: ["Tactive Training", "Training Session"]
      }
    ]
  }
];

let currentQuery = '';

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return esc(text).replace(new RegExp(`(${safe})`, 'gi'), '<mark>$1</mark>');
}

function buildCard(term, uid) {
  const q = currentQuery;
  const name = highlight(term.name, q);
  const summary = highlight(term.summary, q);

  let detail = `<div class="detail-body">${highlight(term.detail, q)}</div>`;

  if (term.note) {
    detail += `<div class="note-box">&#9432; ${esc(term.note)}</div>`;
  }
  if (term.usedBy && term.usedBy.length) {
    detail += `<div class="meta-label">Used by</div><div class="chip-row">${term.usedBy.map(p=>`<span class="chip">${esc(p)}</span>`).join('')}</div>`;
  }
  if (term.platforms && term.platforms.length) {
    detail += `<div class="meta-label">Platforms</div><div class="chip-row">${term.platforms.map(p=>`<span class="chip">${esc(p)}</span>`).join('')}</div>`;
  }
  if (term.hierarchy && term.hierarchy.length) {
    detail += `<div class="meta-label">Content hierarchy</div><div class="hierarchy-row">`;
    term.hierarchy.forEach((s, i) => {
      detail += `<span class="step">${esc(s)}</span>`;
      if (i < term.hierarchy.length - 1) detail += `<span class="arr">→</span>`;
    });
    detail += `</div>`;
  }
  if (term.related && term.related.length) {
    detail += `<div class="meta-label">Related terms</div><div class="chip-row">${term.related.map(r=>`<button class="rel-chip" onclick="focusTerm('${esc(r)}')">${esc(r)}</button>`).join('')}</div>`;
  }

  return `<div class="term-card" id="${uid}" onclick="toggleCard('${uid}')">
    <div class="term-trigger">
      <div class="term-left">
        <div class="term-name">${name}</div>
        <div class="term-summary">${summary}</div>
      </div>
      <div class="term-right">
        <span class="badge badge-${term.badge}">${esc(term.badgeLabel)}</span>
        <svg class="chevron" viewBox="0 0 16 16" fill="none">
          <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
    <div class="term-detail">${detail}</div>
  </div>`;
}

function render(filter) {
  currentQuery = (filter || '').trim().toLowerCase();
  const root = document.getElementById('glossary-root');
  let html = '';
  let total = 0;

  data.forEach(section => {
    const visible = section.terms.filter(t =>
      !currentQuery ||
      t.name.toLowerCase().includes(currentQuery) ||
      t.summary.toLowerCase().includes(currentQuery) ||
      t.detail.toLowerCase().includes(currentQuery)
    );
    if (!visible.length) return;
    total += visible.length;
    html += `<div class="section"><div class="section-label">${esc(section.section)}</div>`;
    visible.forEach((term, i) => {
      const uid = 'tc-' + section.section.replace(/\s/g,'') + i;
      html += buildCard(term, uid);
    });
    html += `</div>`;
  });

  if (!total) html = `<div class="no-results">No terms match "${esc(currentQuery)}"</div>`;
  root.innerHTML = html;

  // auto-open single result
  if (total === 1) {
    const card = root.querySelector('.term-card');
    if (card) card.classList.add('open');
  }
}

function toggleCard(uid) {
  event.stopPropagation();
  const el = document.getElementById(uid);
  if (el) el.classList.toggle('open');
}

function filterTerms(val) { render(val); }

function focusTerm(name) {
  const input = document.getElementById('search');
  input.value = name;
  render(name);
}

render();
</script>
</body>
</html>
